<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ida Parelius — UX/UI Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DESIGN TOKENS ──────────────────────── */
    :root {
      --bg:          #06040D;
      --surface:     #0E0B1C;
      --purple:      #4E3388;
      --purple-mid:  #7055B8;
      --purple-lite: #C4B0F0;
      --lav:         #F4F0F9;
      --lav-60:      rgba(244,240,249,0.6);
      --lav-20:      rgba(244,240,249,0.2);
      --lav-08:      rgba(244,240,249,0.08);
      --pur-40:      rgba(78,51,136,0.4);
      --pur-15:      rgba(78,51,136,0.15);
      --font:        'Space Grotesk', sans-serif;
      --mono:        'Space Mono', monospace;
      --ease:        cubic-bezier(0.16, 1, 0.3, 1);
      --r:           10px;
    }

    /* ── BASE ───────────────────────────────── */
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--lav);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    a, button { cursor: none; }

    /* ── CUSTOM CURSOR ───────────────────────── */
    .c-dot, .c-ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      will-change: left, top;
      z-index: 9999;
    }

    .c-dot {
      width: 5px; height: 5px;
      background: var(--lav);
      z-index: 10000;
      transition: width .15s, height .15s;
    }

    .c-ring {
      width: 30px; height: 30px;
      border: 1px solid rgba(196,176,240,0.45);
      transition: width .22s var(--ease), height .22s var(--ease), border-color .22s;
    }

    body.ch .c-ring  { width: 46px; height: 46px; border-color: rgba(196,176,240,0.75); }
    body.ch .c-dot   { width: 3px; height: 3px; }

    /* ── BACKGROUND LAYERS ──────────────────── */
    .bg-dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(244,240,249,0.07) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    .bg-vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 72% 72% at 50% 50%, transparent 20%, var(--bg) 100%);
    }

    .bg-glow {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(circle 420px at 50% 50%, rgba(78,51,136,0.11) 0%, transparent 70%);
      transition: background 0.6s ease;
    }

    /* ── MAIN LAYOUT ─────────────────────────── */
    .main {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 0;
      user-select: none;
    }

    /* ── LOGO ────────────────────────────────── */
    .logo {
      margin-bottom: 32px;
      opacity: 0;
      animation: fu .9s .05s var(--ease) forwards;
    }

    /* ── ROLE (label above name) ─────────────── */
    .role {
      font-family: var(--mono);
      font-size: clamp(0.62rem, 1.4vw, 0.78rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--lav-60);
      margin-bottom: 10px;
      opacity: 0;
      animation: fu .9s .18s var(--ease) forwards;
    }

    /* ── NAME ────────────────────────────────── */
    .name {
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.028em;
      line-height: 1;
      color: var(--lav);
      margin-bottom: 18px;
      opacity: 0;
      animation: fu .9s .28s var(--ease) forwards;
    }

    /* ── TAGLINE ─────────────────────────────── */
    .tagline {
      font-size: clamp(0.8rem, 1.6vw, 0.95rem);
      font-weight: 300;
      color: var(--lav-60);
      letter-spacing: 0.01em;
      margin-bottom: 52px;
      opacity: 0;
      animation: fu .9s .38s var(--ease) forwards;
    }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      display: flex; align-items: center; gap: 0;
      opacity: 0;
      animation: fu .9s .50s var(--ease) forwards;
    }

    .sep {
      width: 1px; height: 10px;
      background: var(--lav-20);
      margin: 0 28px;
      flex-shrink: 0;
    }

    /* ── NAV LINKS ──────────────────────────── */
    .nav-a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--lav-60);
      text-decoration: none;
      padding: 8px 2px;
      position: relative;
      transition: color .2s;
    }

    .nav-a::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 2px; right: 2px;
      height: 1px;
      background: var(--purple);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s var(--ease);
    }

    .nav-a:hover { color: var(--lav); }
    .nav-a:hover::after { transform: scaleX(1); }

    /* ── SHIP TAGLINE ────────────────────────── */
    .ship-tagline {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.13em;
      color: rgba(196,176,240,0.62);
      margin-top: 22px;
      opacity: 0;
      animation: fu .9s .62s var(--ease) forwards;
    }

    /* ── KEYFRAMES ───────────────────────────── */
    @keyframes fu {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOCUS STYLES ────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--purple);
      outline-offset: 4px;
      border-radius: 3px;
    }

    /* ── MOBILE ──────────────────────────────── */
    @media (max-width: 700px) {
      body { align-items: center; overflow-y: auto; padding: 40px 20px; }
    }

    /* No cursor on touch devices */
    @media (hover: none) {
      .c-dot, .c-ring { display: none; }
      body { cursor: auto; }
      a, button { cursor: pointer; }
    }

    /* ── STARS ───────────────────────────────── */
    .star {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: twinkle var(--d, 4s) var(--delay, 0s) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: var(--op-lo, 0.05); }
      to   { opacity: var(--op-hi, 0.55); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }

    /* ── SPACESHIP ───────────────────────────── */
    .ship {
      position: fixed;
      width: 28px; height: 36px;
      background: none; border: none;
      padding: 18px;
      margin: -18px;
      z-index: 500;
      cursor: none;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 0 5px rgba(196,176,240,0.35));
      transition: filter 0.25s ease;
      will-change: left, top, transform;
    }
    .ship:hover { filter: drop-shadow(0 0 14px rgba(196,176,240,0.8)); }

    @keyframes enginePulse {
      0%, 100% { opacity: 0.65; }
      50%       { opacity: 1; }
    }
    .ship-engine { animation: enginePulse 1.2s ease-in-out infinite; }

    /* ── SHIP POPUP ──────────────────────────── */
    .ship-popup {
      position: fixed;
      z-index: 600;
      background: rgba(14,11,28,0.96);
      border: 1px solid rgba(196,176,240,0.18);
      border-radius: 12px;
      padding: 20px 22px 18px;
      width: 210px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px) scale(0.97);
      transition: opacity 0.24s ease, transform 0.24s var(--ease);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .ship-popup.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .ship-popup-close {
      position: absolute; top: 2px; right: 4px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--lav-60); font-size: 0.72rem;
      cursor: none;
      line-height: 1;
      transition: color 0.2s;
      border-radius: 6px;
    }
    .ship-popup-close:hover { color: var(--lav); }
    .ship-popup-email {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--lav-60);
      margin-bottom: 14px;
      padding-right: 20px;
      word-break: break-all;
    }
    .ship-popup-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--purple); color: var(--lav);
      text-decoration: none;
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 9px 15px; border-radius: 6px;
      transition: background 0.2s ease;
    }
    .ship-popup-btn:hover { background: var(--purple-mid); }

    @media (max-width: 700px) {
      .ship { width: 36px; height: 46px; }
    }
    @media (hover: none) {
      .ship { cursor: pointer; }
      .ship-popup-close { cursor: pointer; }
      .ship-popup-btn { cursor: pointer; }
    }
  </style>
</head>
<body>

  <!-- CURSOR -->
  <div class="c-dot" id="cDot" aria-hidden="true"></div>
  <div class="c-ring" id="cRing" aria-hidden="true"></div>

  <!-- BACKGROUND -->
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>
  <div class="bg-glow" id="bgGlow" aria-hidden="true"></div>

  <!-- STARS -->
  <div id="starsLayer" aria-hidden="true"></div>

  <!-- SPACESHIP -->
  <button class="ship" id="ship" aria-label="Send e-post til Ida">
    <svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="lineGlow" x="-200%" y="-10%" width="500%" height="120%">
          <feGaussianBlur stdDeviation="1.4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="planeGlow" x="-60%" y="-25%" width="220%" height="150%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feFlood flood-color="rgba(140,55,255,0.45)" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
          <feMerge>
            <feMergeNode in="colorBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <g filter="url(#planeGlow)">
        <!-- Right wing panel -->
        <path d="M14 1 L27 27 L15 22 Z"
              fill="rgba(38,20,68,0.88)"
              stroke="rgba(200,160,255,0.8)"
              stroke-width="1.2" stroke-linejoin="round"/>
        <!-- Left wing panel -->
        <path d="M14 1 L1 27 L13 22 Z"
              fill="rgba(22,12,44,0.95)"
              stroke="rgba(200,160,255,0.8)"
              stroke-width="1.2" stroke-linejoin="round"/>
        <!-- Fuselage -->
        <path d="M13 22 L15 22 L17 32 L14 29 L11 32 Z"
              fill="rgba(28,15,55,0.92)"
              stroke="rgba(200,160,255,0.55)"
              stroke-width="1" stroke-linejoin="round"/>
      </g>

      <!-- Wing fold crease lines -->
      <line x1="14" y1="14" x2="24" y2="26" stroke="rgba(196,176,240,0.22)" stroke-width="0.8"/>
      <line x1="14" y1="14" x2="4"  y2="26" stroke="rgba(196,176,240,0.22)" stroke-width="0.8"/>

      <!-- Purple center spine -->
      <line x1="14" y1="1" x2="14" y2="29"
            stroke="rgba(155,70,255,0.32)" stroke-width="5"/>
      <line x1="14" y1="1" x2="14" y2="29"
            stroke="rgba(165,80,255,0.95)" stroke-width="1.4"
            filter="url(#lineGlow)"/>

      <!-- Engine core — trail handles the rest -->
      <circle class="ship-engine" cx="14" cy="29" r="3.5"
              fill="rgba(225,200,255,0.98)"/>
    </svg>
  </button>

  <div class="ship-popup" id="shipPopup" role="dialog" aria-modal="true" aria-label="Send e-post til Ida Parelius">
    <button class="ship-popup-close" id="shipClose" aria-label="Lukk">✕</button>
    <p class="ship-popup-email">ida.parelius@gmail.com</p>
    <a href="mailto:ida.parelius@gmail.com" class="ship-popup-btn">Send mail →</a>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main">

    <div class="logo" aria-label="Ida Parelius monogram">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="9" width="30" height="30" rx="2"
              transform="rotate(45 24 24)"
              stroke="rgba(244,240,249,0.65)" stroke-width="1.4" fill="none"/>
        <circle cx="24" cy="5.5" r="2" fill="#4E3388" opacity="0.7"/>
        <circle cx="24" cy="42.5" r="2" fill="#4E3388" opacity="0.7"/>
      </svg>
    </div>

    <p class="role">UX / UI Designer</p>
    <h1 class="name">Ida Parelius</h1>
    <p class="tagline">Jeg gjør digitale produkter enklere å bruke</p>

    <nav class="nav" aria-label="Primær navigasjon">
      <a href="projects.html" class="nav-a">Projects</a>
      <div class="sep" aria-hidden="true"></div>
      <a href="about.html" class="nav-a">About</a>
      <div class="sep" aria-hidden="true"></div>
      <a href="cv.html" class="nav-a">CV</a>
    </nav>

    <p class="ship-tagline">Kontakt meg? Fang flyet! ✈</p>

  </main>


  <script>
    /* ── CURSOR ─────────────────────────────── */
    const dot  = document.getElementById('cDot');
    const ring = document.getElementById('cRing');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';
    });

    (function animRing() {
      rx += (mx - rx) * 0.11;
      ry += (my - ry) * 0.11;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animRing);
    })();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('ch'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));
    });

    /* ── TWINKLING STARS ────────────────────── */
    (function createStars() {
      const layer = document.getElementById('starsLayer');
      const count = 90;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() < 0.7 ? 1 : (Math.random() < 0.6 ? 1.5 : 2);
        const opLo = (0.04 + Math.random() * 0.08).toFixed(2);
        const opHi = (0.3  + Math.random() * 0.45).toFixed(2);
        const dur  = (3 + Math.random() * 5).toFixed(1);
        const del  = (Math.random() * 6).toFixed(1);
        s.style.cssText = [
          `width:${size}px`, `height:${size}px`,
          `left:${(Math.random()*100).toFixed(2)}%`,
          `top:${(Math.random()*100).toFixed(2)}%`,
          `background:rgba(244,240,249,0.9)`,
          `z-index:2`,
          `--op-lo:${opLo}`, `--op-hi:${opHi}`,
          `--d:${dur}s`, `--delay:${del}s`
        ].join(';');
        layer.appendChild(s);
      }
    })();

    /* ── SPACESHIP ──────────────────────────── */
    (function initShip() {
      const ship     = document.getElementById('ship');
      const popup    = document.getElementById('shipPopup');
      const closeBtn = document.getElementById('shipClose');
      const mailBtn  = popup.querySelector('.ship-popup-btn');

      // ── Canvas exhaust trail ──────────────────
      const trailCanvas = document.createElement('canvas');
      trailCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:499;';
      document.body.appendChild(trailCanvas);
      const ctx = trailCanvas.getContext('2d');

      const trail = [];
      const TRAIL_LEN = 32;

      function resizeTrail() {
        trailCanvas.width  = window.innerWidth;
        trailCanvas.height = window.innerHeight;
      }
      resizeTrail();

      function drawTrail() {
        ctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        for (let i = 0; i < trail.length; i++) {
          const p   = trail[i];
          const age = i / trail.length;        // 0 = oldest, 1 = newest
          const alpha  = age * 0.9;
          const radius = 1.5 + age * 8;
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
          grad.addColorStop(0,   `rgba(225,200,255,${alpha})`);
          grad.addColorStop(0.4, `rgba(165,80,255,${(alpha * 0.55).toFixed(3)})`);
          grad.addColorStop(1,   'rgba(100,40,200,0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }
      }

      // ── Flight state ──────────────────────────
      const PAD = 52;
      let W = window.innerWidth, H = window.innerHeight;
      let sx = PAD + Math.random() * (W - PAD * 2);
      let sy = PAD + Math.random() * (H - PAD * 2);

      const SPD_MIN = 0.28, SPD_MAX = 0.62;
      let speed       = 0.45;
      let targetSpeed = speed;

      let angle   = Math.random() * Math.PI * 2;
      let vx      = Math.cos(angle) * speed;
      let vy      = Math.sin(angle) * speed;
      let wobbleT = Math.random() * Math.PI * 2;
      let paused  = false;

      window.addEventListener('resize', () => {
        W = window.innerWidth; H = window.innerHeight;
        resizeTrail();
      });

      function place() {
        ship.style.left = (sx - 14) + 'px';
        ship.style.top  = (sy - 18) + 'px';
        const baseDeg = Math.atan2(vy, vx) * 180 / Math.PI + 90;
        const wobble  = Math.sin(wobbleT) * 3.5;
        ship.style.transform = 'rotate(' + (baseDeg + wobble) + 'deg)';
      }

      function tick() {
        if (!paused) {
          wobbleT += 0.028;

          if (Math.random() < 0.005) {
            targetSpeed = SPD_MIN + Math.random() * (SPD_MAX - SPD_MIN);
          }
          speed += (targetSpeed - speed) * 0.008;

          if (Math.random() < 0.016) {
            angle = Math.atan2(vy, vx) + (Math.random() - 0.5) * 0.7;
          }

          vx += (mx - sx) * 0.00055;
          vy += (my - sy) * 0.00055;

          const vLen = Math.sqrt(vx * vx + vy * vy) || speed;
          vx = (vx / vLen) * speed;
          vy = (vy / vLen) * speed;

          sx += vx; sy += vy;
          let bounced = false;
          if (sx < PAD)     { sx = PAD;     vx =  Math.abs(vx); bounced = true; }
          if (sx > W - PAD) { sx = W - PAD; vx = -Math.abs(vx); bounced = true; }
          if (sy < PAD)     { sy = PAD;     vy =  Math.abs(vy); bounced = true; }
          if (sy > H - PAD) { sy = H - PAD; vy = -Math.abs(vy); bounced = true; }

          if (bounced) {
            // Clear trail on direction change so it never appears in front
            trail.length = 0;
          } else {
            const exA = Math.atan2(-vy, -vx);
            trail.push({ x: sx + Math.cos(exA) * 15, y: sy + Math.sin(exA) * 15 });
            if (trail.length > TRAIL_LEN) trail.shift();
          }

          place();
        } else {
          // Gradually fade trail when paused
          if (trail.length > 0) trail.shift();
        }

        drawTrail();
        requestAnimationFrame(tick);
      }

      place();
      if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) tick();

      // iOS fix
      document.addEventListener('touchstart', function(){}, {passive: true});

      // Pause on hover so it's easy to click
      ship.addEventListener('mouseenter', () => { if (!popup.classList.contains('open')) paused = true; });
      ship.addEventListener('mouseleave', () => { if (!popup.classList.contains('open')) paused = false; });

      function openPopup() {
        paused = true;
        popup.style.visibility = '';
        const pw = 210;
        const ph = popup.offsetHeight || 110;
        let px = sx - pw / 2;
        let py = sy - 18 - ph - 14;
        if (py < 12) py = sy + 36;
        if (px < 12) px = 12;
        if (px + pw > W - 12) px = W - pw - 12;
        popup.style.left = px + 'px';
        popup.style.top  = py + 'px';
        popup.classList.add('open');
        setTimeout(() => closeBtn.focus(), 50);
      }

      ship.addEventListener('click', openPopup);
      ship.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (!popup.classList.contains('open')) openPopup();
      }, { passive: false });

      function closePopup() {
        popup.classList.remove('open');
        paused = false;
        // Blur any focused element inside popup before it fades
        if (popup.contains(document.activeElement)) document.activeElement.blur();
      }

      // Fully hide popup after fade-out so backdrop-filter doesn't linger
      popup.addEventListener('transitionend', e => {
        if (e.propertyName === 'opacity' && !popup.classList.contains('open')) {
          popup.style.visibility = 'hidden';
        }
      });

      closeBtn.addEventListener('click', closePopup);

      // Focus trap — Tab cycles only inside popup
      popup.addEventListener('keydown', e => {
        if (e.key !== 'Tab') return;
        if (e.shiftKey) {
          if (document.activeElement === closeBtn) { e.preventDefault(); mailBtn.focus(); }
        } else {
          if (document.activeElement === mailBtn)  { e.preventDefault(); closeBtn.focus(); }
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && popup.classList.contains('open')) closePopup();
      });
      document.addEventListener('click', e => {
        if (popup.classList.contains('open') && !popup.contains(e.target) && !ship.contains(e.target)) closePopup();
      });

      // Register with custom cursor
      [ship, closeBtn, mailBtn].forEach(el => {
        if (!el) return;
        el.addEventListener('mouseenter', () => document.body.classList.add('ch'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));
      });
    })();

    /* ── AMBIENT GLOW FOLLOWS MOUSE ─────────── */
    const bgGlow = document.getElementById('bgGlow');
    document.addEventListener('mousemove', e => {
      const px = (e.clientX / window.innerWidth)  * 100;
      const py = (e.clientY / window.innerHeight) * 100;
      bgGlow.style.background =
        `radial-gradient(circle 450px at ${px}% ${py}%, rgba(78,51,136,0.13) 0%, transparent 70%)`;
    });
  </script>

</body>
</html>
