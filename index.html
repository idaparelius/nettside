<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ida Parelius — UX/UI Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DESIGN TOKENS ──────────────────────── */
    :root {
      --bg:          #06040D;
      --surface:     #0E0B1C;
      --purple:      #4E3388;
      --purple-mid:  #7055B8;
      --purple-lite: #C4B0F0;
      --lav:         #F4F0F9;
      --lav-60:      rgba(244,240,249,0.6);
      --lav-20:      rgba(244,240,249,0.2);
      --lav-08:      rgba(244,240,249,0.08);
      --pur-40:      rgba(78,51,136,0.4);
      --pur-15:      rgba(78,51,136,0.15);
      --font:        'Space Grotesk', sans-serif;
      --mono:        'Space Mono', monospace;
      --ease:        cubic-bezier(0.16, 1, 0.3, 1);
      --r:           10px;
    }

    /* ── BASE ───────────────────────────────── */
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--lav);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    a, button { cursor: none; }

    /* ── CUSTOM CURSOR ───────────────────────── */
    .c-dot, .c-ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      will-change: left, top;
      z-index: 9999;
    }

    .c-dot {
      width: 5px; height: 5px;
      background: var(--lav);
      z-index: 10000;
      transition: width .15s, height .15s;
    }

    .c-ring {
      width: 30px; height: 30px;
      border: 1px solid var(--lav-20);
      transition: width .22s var(--ease), height .22s var(--ease), border-color .22s;
    }

    body.ch .c-ring  { width: 46px; height: 46px; border-color: var(--pur-40); }
    body.ch .c-dot   { width: 3px; height: 3px; }

    /* ── BACKGROUND LAYERS ──────────────────── */
    .bg-dots {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(244,240,249,0.07) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    .bg-vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 72% 72% at 50% 50%, transparent 20%, var(--bg) 100%);
    }

    .bg-glow {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(circle 420px at 50% 50%, rgba(78,51,136,0.11) 0%, transparent 70%);
      transition: background 0.6s ease;
    }

    /* ── MAIN LAYOUT ─────────────────────────── */
    .main {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 0;
      user-select: none;
    }

    /* ── LOGO ────────────────────────────────── */
    .logo {
      margin-bottom: 32px;
      opacity: 0;
      animation: fu .9s .05s var(--ease) forwards;
    }

    /* ── NAME ────────────────────────────────── */
    .name {
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.028em;
      line-height: 1;
      color: var(--lav);
      margin-bottom: 14px;
      opacity: 0;
      animation: fu .9s .18s var(--ease) forwards;
    }

    /* ── ROLE ────────────────────────────────── */
    .role {
      font-family: var(--mono);
      font-size: clamp(0.62rem, 1.4vw, 0.78rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--lav-60);
      margin-bottom: 56px;
      opacity: 0;
      animation: fu .9s .32s var(--ease) forwards;
    }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      display: flex; align-items: center; gap: 0;
      opacity: 0;
      animation: fu .9s .46s var(--ease) forwards;
    }

    .sep {
      width: 1px; height: 10px;
      background: var(--lav-20);
      margin: 0 28px;
      flex-shrink: 0;
    }

    /* ── NAV LINKS (CV, About) ──────────────── */
    .nav-a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--lav-60);
      text-decoration: none;
      padding: 8px 2px;
      position: relative;
      transition: color .2s;
    }

    .nav-a::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 2px; right: 2px;
      height: 1px;
      background: var(--purple);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s var(--ease);
    }

    .nav-a:hover { color: var(--lav); }
    .nav-a:hover::after { transform: scaleX(1); }

    /* ── PROJECTS LINK ─────────────────────────── */
    .proj-a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--lav);
      font-weight: 700;
      text-decoration: none;
      padding: 8px 2px;
      position: relative;
    }

    .proj-a::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 2px; right: 2px;
      height: 1px;
      background: var(--purple);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform .3s var(--ease);
    }

    .proj-a:hover::after { transform: scaleX(1); }


    /* ── KEYFRAMES ───────────────────────────── */
    @keyframes fu {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOCUS STYLES ────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--purple);
      outline-offset: 4px;
      border-radius: 3px;
    }

    /* ── MOBILE ──────────────────────────────── */
    @media (max-width: 700px) {
      body { align-items: center; overflow-y: auto; padding: 40px 20px; }
    }

    /* No cursor on touch devices */
    @media (hover: none) {
      .c-dot, .c-ring { display: none; }
      body { cursor: auto; }
      a, button { cursor: pointer; }
    }

    /* ── STARS ───────────────────────────────── */
    .star {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: twinkle var(--d, 4s) var(--delay, 0s) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: var(--op-lo, 0.05); }
      to   { opacity: var(--op-hi, 0.55); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- CURSOR -->
  <div class="c-dot" id="cDot" aria-hidden="true"></div>
  <div class="c-ring" id="cRing" aria-hidden="true"></div>

  <!-- BACKGROUND -->
  <div class="bg-dots" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>
  <div class="bg-glow" id="bgGlow" aria-hidden="true"></div>

  <!-- STARS -->
  <div id="starsLayer" aria-hidden="true"></div>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- LOGO / MONOGRAM -->
    <!-- LOGO / MONOGRAM -->
    <div class="logo" aria-label="Ida Parelius monogram">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Rotated square (diamond frame) -->
        <rect x="9" y="9" width="30" height="30" rx="2"
              transform="rotate(45 24 24)"
              stroke="rgba(244,240,249,0.65)" stroke-width="1.4" fill="none"/>
        <!-- IP tekst -->
        <text x="24" y="28" text-anchor="middle"
              font-family="Space Mono, monospace"
              font-size="10" font-weight="700"
              fill="#F4F0F9" letter-spacing="-0.5">IP</text>
        <!-- Small purple dots (top and bottom) -->
        <circle cx="24" cy="5.5" r="2" fill="#4E3388" opacity="0.7"/>
        <circle cx="24" cy="42.5" r="2" fill="#4E3388" opacity="0.7"/>
      </svg>
    </div>

    <!-- NAME -->
    <h1 class="name">Ida Parelius</h1>

    <!-- ROLE -->
    <p class="role">UX / UI Designer</p>

    <!-- NAV -->
    <nav class="nav" aria-label="Primær navigasjon">

      <a href="about.html" class="nav-a">About</a>
      <div class="sep" aria-hidden="true"></div>
      <a href="cv.html" class="nav-a">CV</a>
      <div class="sep" aria-hidden="true"></div>
      <a href="projects.html" class="nav-a">Projects</a>

    </nav>
  </main>


  <script>
    /* ── CURSOR ─────────────────────────────── */
    const dot  = document.getElementById('cDot');
    const ring = document.getElementById('cRing');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';
    });

    (function animRing() {
      rx += (mx - rx) * 0.11;
      ry += (my - ry) * 0.11;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animRing);
    })();

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('ch'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));
    });

    /* ── TWINKLING STARS ────────────────────── */
    (function createStars() {
      const layer = document.getElementById('starsLayer');
      const count = 90;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() < 0.7 ? 1 : (Math.random() < 0.6 ? 1.5 : 2);
        const opLo = (0.04 + Math.random() * 0.08).toFixed(2);
        const opHi = (0.3  + Math.random() * 0.45).toFixed(2);
        const dur  = (3 + Math.random() * 5).toFixed(1);
        const del  = (Math.random() * 6).toFixed(1);
        s.style.cssText = [
          `width:${size}px`, `height:${size}px`,
          `left:${(Math.random()*100).toFixed(2)}%`,
          `top:${(Math.random()*100).toFixed(2)}%`,
          `background:rgba(244,240,249,0.9)`,
          `z-index:2`,
          `--op-lo:${opLo}`, `--op-hi:${opHi}`,
          `--d:${dur}s`, `--delay:${del}s`
        ].join(';');
        layer.appendChild(s);
      }
    })();

    /* ── AMBIENT GLOW FOLLOWS MOUSE ─────────── */
    const bgGlow = document.getElementById('bgGlow');
    document.addEventListener('mousemove', e => {
      const px = (e.clientX / window.innerWidth)  * 100;
      const py = (e.clientY / window.innerHeight) * 100;
      bgGlow.style.background =
        `radial-gradient(circle 450px at ${px}% ${py}%, rgba(78,51,136,0.13) 0%, transparent 70%)`;
    });
  </script>

</body>
</html>
